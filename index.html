<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网站导航</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft kaiti', sans-serif;
        }
        
        :root {
            --primary-color: #4a6de5;
            --bg-color: #eeeeee;
            --card-color: #e3e3e3;
            --text-color: #333333;
            --border-color: #eaeaea;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            --menu-hover: #4a6de5;
            --menu-border: #e0e0e0;
            --menu-text: #555;
            --menu-disabled: #999;
        }
        
        .dark-mode {
            --primary-color: #6d8bf0;
            --bg-color: #202020;
            --card-color: #424242;
            --text-color: #e4e6eb;
            --border-color: #3a3f50;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            --menu-hover: #6d8bf0;
            --menu-border: #444;
            --menu-text: #e4e6eb;
            --menu-disabled: #666;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            min-height: 100vh;
            padding: 12px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px; 
            padding-top: 10px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo i {
            color: var(--primary-color);
            font-size: 28px;
        }
        
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
        }
        
        .theme-toggle {
            background: var(--card-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }
        
        .theme-toggle:hover {
            transform: translateY(-2px);
        }
        
        .search-container {
            margin-bottom: 20px;
        }
        
        .search-box {
            position: relative;
            max-width: 100%;
            margin: 0 auto;
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 46px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            font-size: 15px;
            background-color: var(--card-color);
            color: var(--text-color);
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(74, 109, 229, 0.1);
        }
        
        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 16px;
        }
        
        .category-tabs {
            display: flex;
            justify-content: flex-start;
            flex-wrap: nowrap; 
            gap: 8px; 
            margin-bottom: 20px; 
            padding-bottom: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .category-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab {
            padding: 8px 16px;
            border-radius: 20px; 
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .tab:hover, .tab.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .websites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(calc(50% - 8px), 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .website-card {
            background-color: var(--card-color);
            border-radius: 16px;
            padding: 16px 8px; 
            text-align: center;
            transition: all 0.3s;
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow);
            cursor: pointer;
            text-decoration: none;
            color: var(--text-color);
            display: block;
            position: relative;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .website-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }
        
        .website-icon {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 20px;
            color: white;
        }
        
        .website-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
            line-height: 1.2;
        }
        
        .website-desc {
            font-size: 11px;
            color: #888;
            line-height: 1.3;
            padding: 0 4px;
        }
        
        .dark-mode .website-desc {
            color: #aaa;
        }
        
        .custom-site {
            background-color: var(--card-color);
            border-radius: 12px;
            padding: 20px 16px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        
        .custom-site h3 {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }
        
        .custom-site h3 i {
            color: var(--primary-color);
            font-size: 16px;
        }
        
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px
        }
        
        .input-group {
            flex: 1;
            min-width: 100%;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
        }
        
        .btn {
            padding: 12px 0;
            width: 100%;
            background-color: var(--primary-color);
            color:#ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }
        
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        footer {
            text-align: center;
            padding: 16px 0;
            color: #888;
            font-size: 12px;
            border-top: 1px solid var(--border-color);
            margin-top: 10px;
        }
        
        .context-menu {
            position: absolute;
            width: 160px;
            background-color: var(--card-color);
            border: 1px solid var(--menu-border);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: none;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.2s ease;
            overflow: hidden;
        }
        
        .context-menu.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }
        
        .context-menu-item {
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--menu-text);
            font-size: 13px;
            border-bottom: 1px solid var(--menu-border);
        }
        
        .context-menu-item:last-child {
            border-bottom: none;
        }
        
        .context-menu-item:hover {
            background-color: var(--menu-hover);
            color: white;
            padding-left: 16px;
        }
        
        .context-menu-item.disabled {
            color: var(--menu-disabled);
            cursor: not-allowed;
        }
        
        .context-menu-item.disabled:hover {
            background-color: transparent;
            color: var(--menu-disabled);
            padding-left: 14px;
        }
        
        .context-menu-item i {
            font-size: 13px;
            width: 14px;
            text-align: center;
        }
        
        .website-card.pinned {
            border: 2px solid var(--primary-color);
        }
        
        .pinned-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 10px;
            color: var(--primary-color);
        }
        
        @media (min-width: 768px) {
            body {
                padding: 20px;
            }
            
            header {
                margin-bottom: 40px;
                padding-top: 20px;
            }
            
            .logo {
                gap: 12px;
            }
            
            .logo i {
                font-size: 38px;
            }
            
            .logo h1 {
                font-size: 36px;
            }
            
            .theme-toggle {
                width: 44px;
                height: 44px;
            }
            
            .search-container {
                margin-bottom: 40px;
            }
            
            .search-box {
                max-width: 600px;
            }
            
            .search-box input {
                padding: 16px 20px 16px 50px;
                border-width: 4px;
                border-radius: 20px;
                font-size: 16px;
            }
            
            .search-box i {
                left: 20px;
                font-size: 16px;
            }
            
            .category-tabs {
                justify-content: center;
                flex-wrap: wrap;
                overflow-x: visible;
                gap: 10px;
                margin-bottom: 30px;
                padding-bottom: 0;
            }
            
            .tab {
                padding: 10px 20px;
                border-radius: 30px;
                font-size: 16px;
            }
            
            .websites-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 20px;
                margin-bottom: 40px;
            }
            
            .website-card {
                padding: 20px;
                border-width: 4px;
                border-radius: 20px;
                min-height: auto;
            }
            
            .website-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
                margin-bottom: 15px;
                border-radius: 10px;
            }
            
            .website-name {
                font-size: 16px;
                margin-bottom: 5px;
            }
            
            .website-desc {
                font-size: 13px;
                padding: 0;
            }
            
            .custom-site {
                padding: 30px;
                margin-bottom: 40px;
            }
            
            .custom-site h3 {
                margin-bottom: 20px;
                gap: 10px;
                font-size: 18px;
            }
            
            .custom-site h3 i {
                font-size: 18px;
            }
            
            .form-row {
                gap: 15px;
                margin-bottom: 20px;
            }
            
            .input-group {
                min-width: 200px;
            }
            
            .input-group label {
                margin-bottom: 8px;
                font-size: 16px;
            }
            
            .input-group input {
                padding: 12px 15px;
                font-size: 16px;
            }
            
            .btn {
                width: auto;
                padding: 12px 25px;
            }
            
            footer {
                padding: 20px;
                font-size: 14px;
                margin-top: 20px;
            }
            
            .context-menu {
                width: 180px;
                border-radius: 10px;
            }
            
            .context-menu-item {
                padding: 12px 18px;
                font-size: 14px;
                gap: 10px;
            }
            
            .context-menu-item i {
                font-size: 14px;
                width: 16px;
            }
            
            .pinned-badge {
                top: 8px;
                right: 8px;
                font-size: 12px;
            }
        }
        
        @media (min-width: 480px) and (max-width: 767px) {
            .websites-grid {
                grid-template-columns: repeat(auto-fill, minmax(30%, 1fr));
            }
            
            .input-group {
                min-width: calc(50% - 6px);
            }
            
            .btn {
                width: auto;
                padding: 12px 25px;
            }
        }
    </style>
</head>

        let currentSite = null; 

        document.addEventListener('contextmenu', (e) => {
            if (e.target.closest('.website-card')) {
                e.preventDefault();
                const card = e.target.closest('.website-card');
                const siteName = card.querySelector('.website-name').textContent;
                const allWebsites = getAvailableWebsites();
                currentSite = allWebsites.find(site => site.name === siteName);

                if (currentSite) {
                    const rect = card.getBoundingClientRect();
                    const leftPos = Math.min(rect.left + e.offsetX, window.innerWidth - 190);
                    const topPos = Math.min(rect.top + e.offsetY, window.innerHeight - 100);
                    
                    contextMenu.style.top = `${topPos + window.scrollY}px`;
                    contextMenu.style.left = `${leftPos + window.scrollX}px`;
                    contextMenu.classList.add('show');

                    const isPinned = pinnedSites.some(s => s.name === currentSite.name && s.url === currentSite.url);
                    pinSite.innerHTML = isPinned 
                        ? '<i class="fas fa-thumbtack"></i> 取消置顶' 
                        : '<i class="fas fa-thumbtack"></i> 置顶网站';
                    
                    deleteSite.classList.remove('disabled');
                }
            } else {
                contextMenu.classList.remove('show');
                currentSite = null;
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.context-menu')) {
                contextMenu.classList.remove('show');
            }
        });

        pinSite.addEventListener('click', () => {
            if (!currentSite) return;
            
            const isPinned = pinnedSites.some(s => s.name === currentSite.name && s.url === currentSite.url);
            
            if (isPinned) {
                pinnedSites = pinnedSites.filter(s => !(s.name === currentSite.name && s.url === currentSite.url));
            } else {
                pinnedSites.push(currentSite);
            }
            
            localStorage.setItem('pinnedSites', JSON.stringify(pinnedSites));
            renderWebsites();
            contextMenu.classList.remove('show');
        });

        deleteSite.addEventListener('click', () => {
            if (!currentSite) return;
            
            if (confirm(`确定要删除 "${currentSite.name}" 吗？删除后可手动重新添加。`)) {
                deletedSites.push({
                    name: currentSite.name,
                    url: currentSite.url
                });
                localStorage.setItem('deletedSites', JSON.stringify(deletedSites));
                
                pinnedSites = pinnedSites.filter(s => !(s.name === currentSite.name && s.url === currentSite.url));
                localStorage.setItem('pinnedSites', JSON.stringify(pinnedSites));
                
                customWebsites = customWebsites.filter(s => !(s.name === currentSite.name && s.url === currentSite.url));
                localStorage.setItem('customWebsites', JSON.stringify(customWebsites));
                
                renderCategoryTabs();
                renderWebsites();
                contextMenu.classList.remove('show');
            }
        });

        function getAvailableWebsites() {
            const availableOriginal = originalWebsites.filter(site => 
                !deletedSites.some(d => d.name === site.name && d.url === site.url)
            );
            const availableCustom = customWebsites.filter(site => 
                !deletedSites.some(d => d.name === site.name && d.url === site.url)
            );
            
            return [...availableOriginal, ...availableCustom];
        }

        function getAllCategories() {
            const categoriesSet = new Set();
            categoriesSet.add('全部');
            
            const availableWebsites = getAvailableWebsites();
            availableWebsites.forEach(site => {
                categoriesSet.add(site.category);
            });
            
            return Array.from(categoriesSet);
        }

        function renderCategoryTabs() {
            const categories = getAllCategories();
            categoryTabs.innerHTML = '';
            
            categories.forEach(category => {
                const tab = document.createElement('div');
                tab.className = 'tab';
                if (category === currentCategory) tab.classList.add('active');
                tab.textContent = category;
                tab.dataset.category = category;
                
                tab.addEventListener('click', () => {
                    currentCategory = category;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderWebsites();
                });
                
                categoryTabs.appendChild(tab);
            });
        }

        function renderWebsites() {
            websitesGrid.innerHTML = '';
            
            let allWebsites = getAvailableWebsites();
            
            const [pinned, normal] = allWebsites.reduce((acc, site) => {
                const isPinned = pinnedSites.some(s => s.name === site.name && s.url === site.url);
                if (isPinned) {
                    acc[0].push(site);
                } else {
                    acc[1].push(site);
                }
                return acc;
            }, [[], []]);
            
            allWebsites = [...pinned, ...normal];
            
            let filteredWebsites = allWebsites;
            
            if (currentCategory !== '全部') {
                filteredWebsites = allWebsites.filter(site => site.category === currentCategory);
            }
            
            const searchTerm = searchInput.value.toLowerCase().trim();
            if (searchTerm) {
                filteredWebsites = filteredWebsites.filter(site => 
                    site.name.toLowerCase().includes(searchTerm) || 
                    site.desc.toLowerCase().includes(searchTerm) ||
                    site.category.toLowerCase().includes(searchTerm)
                );
            }
            
            filteredWebsites.forEach(site => {
                const card = document.createElement('a');
                card.className = 'website-card';
                if (pinnedSites.some(s => s.name === site.name && s.url === site.url)) {
                    card.classList.add('pinned');
                }
                card.href = site.url;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                
                let iconHtml = '';
                if (site.image) {
                    iconHtml = `<img src="${site.image}" alt="${site.name}" style="width: 42px; height: 42px;">`;
                } else if (site.icon) {
                    if (site.icon.startsWith('fa-brands')) {
                        iconHtml = `<i class="${site.icon}"></i>`;
                    } else if (site.icon.startsWith('fa-solid')) {
                        iconHtml = `<i class="${site.icon}"></i>`;
                    } else {
                        iconHtml = `<i class="fas fa-globe"></i>`;
                    }
                } else {
                    iconHtml = `<i class="fas fa-globe"></i>`;
                }

                const pinnedBadge = pinnedSites.some(s => s.name === site.name && s.url === site.url) 
                    ? '<i class="fas fa-thumbtack pinned-badge"></i>' 
                    : '';
                
                card.innerHTML = `
                    ${pinnedBadge}
                    <div class="website-icon" style="background-color: ${site.color || '#4a6de5'}">
                        ${iconHtml}
                    </div>
                    <div class="website-name">${site.name}</div>
                    <div class="website-desc">${site.desc}</div>
                `;
                
                websitesGrid.appendChild(card);
            });
            
            if (filteredWebsites.length === 0) {
                websitesGrid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #888;">
                        <i class="fas fa-search" style="font-size: 48px; margin-bottom: 20px;"></i>
                        <h3>未找到匹配的网站</h3>
                        <p>尝试修改搜索关键词或选择其他分类</p>
                    </div>
                `;
            }
        }

        function addCustomSite() {
            const name = siteNameInput.value.trim();
            const url = siteUrlInput.value.trim();
            const category = siteCategoryInput.value.trim() || '自定义';
            
            if (!name || !url) {
                alert('请输入网站名称和网址');
                return;
            }
            
            let fullUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                fullUrl = 'https://' + url;
            }
            
            try {
                new URL(fullUrl);
            } catch (e) {
                alert('请输入有效的网址');
                return;
            }
            
            deletedSites = deletedSites.filter(d => !(d.name === name && d.url === fullUrl));
            localStorage.setItem('deletedSites', JSON.stringify(deletedSites));
            
            const newSite = {
                name,
                url: fullUrl,
                category,
                icon: 'fa-solid fa-star',
                color: '#FFC107',
                desc: '自定义网站'
            };
            
            const exists = getAvailableWebsites().some(s => s.name === name && s.url === fullUrl);
            if (exists) {
                alert('该网站已存在！');
                return;
            }
            
            customWebsites.push(newSite);
            localStorage.setItem('customWebsites', JSON.stringify(customWebsites));
            
            siteNameInput.value = '';
            siteUrlInput.value = '';
            
            renderCategoryTabs();
            renderWebsites();
            
            const customTab = document.querySelector('.tab[data-category="自定义"]');
            if (customTab) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                customTab.classList.add('active');
                currentCategory = '自定义';
                renderWebsites();
            }
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-lightbulb"></i>';
            } else {
                document.body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '<i class="fa-solid fa-lightbulb"></i>';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }

        function handleSearch() {
            renderWebsites();
        }

        function navigateToUrl(url) {
            if (!url) return;
            
            let fullUrl = url.trim();
            if (!fullUrl.startsWith('http://') && !fullUrl.startsWith('https://')) {
                fullUrl = 'https://' + fullUrl;
            }
            
            try {
                new URL(fullUrl);
                window.open(fullUrl, '_blank');
                searchInput.value = '';
            } catch (e) {
                handleSearch();
            }
        }

        searchInput.addEventListener('input', handleSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                navigateToUrl(searchInput.value);
            }
        });
        
        themeToggle.addEventListener('click', toggleTheme);
        addSiteBtn.addEventListener('click', addCustomSite);

        function init() {
            initTheme();
            renderCategoryTabs();
            renderWebsites();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
